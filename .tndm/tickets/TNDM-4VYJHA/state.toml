[[tasks]]
number = 6
title = "Replace transport.ts with vscode-jsonrpc connection wrapper"
status = "done"
files = ["packages/supi-lsp/src/client/transport.ts"]
verification = "Write a new unit test (or update transport.test.ts) that verifies: (a) StreamMessageReader/Writer wrap stdin/stdout, (b) createMessageConnection dispatches requests and notifications, (c) sendRequest resolves with response, (d) connection disposal cleans up. Run: pnpm vitest run packages/supi-lsp/__tests__/unit/transport.test.ts"
notes = "Replace the custom JsonRpcClient class with a thin wrapper around vscode-jsonrpc's createMessageConnection, StreamMessageReader, and StreamMessageWriter. The wrapper should expose the same interface LspClient expects: sendRequest(method, params, options?), sendNotification(method, params), onNotification(handler), onRequest(handler), dispose(). vscode-jsonrpc handles Content-Length framing, partial message buffering, and connection lifecycle. Wire timeout via CancellationToken. The JsonRpcRequestError class should be replaced with vscode-jsonrpc's ResponseError or kept as a re-export shim."

