name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Lint GitHub Actions workflows
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca # v1.7.12

  conventional-commits:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up workspace dependencies
        uses: ./.github/actions/setup-pnpm

      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          REGEX='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([^)]+\))?(!)?: .+$'

          if [[ ! "$PR_TITLE" =~ $REGEX ]]; then
            echo "PR title must follow Conventional Commits."
            echo "Example: feat(lsp): add diagnostics summary"
            echo "Got: $PR_TITLE"
            exit 1
          fi

      - name: Validate current commit (last commit)
        if: github.event_name == 'push'
        run: pnpm exec commitlint --last --verbose

      - name: Validate PR commits
        if: github.event_name == 'pull_request'
        run: pnpm exec commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up workspace dependencies
        uses: ./.github/actions/setup-pnpm

      - name: Check release-please config coverage
        run: |
          publishable=$(mktemp)
          configured=$(mktemp)
          for dir in packages/*/; do
            if [ -f "$dir/package.json" ] && [ "$(jq -r '.private // false' "$dir/package.json")" = "false" ]; then
              echo "${dir%/}"
            fi
          done | sort > "$publishable"
          # Single-root release-please config manages versions via extra-files
          jq -r '.packages["."]["extra-files"][] // empty' release-please-config.json | sed 's|/package\.json$||' | sort > "$configured"
          if ! diff -q "$publishable" "$configured"; then
            echo "::error::Mismatch between publishable packages and release-please config"
            diff "$publishable" "$configured" || true
            exit 1
          fi

      - name: Install ripgrep
        run: sudo apt-get install -y ripgrep

      - name: Verify workspace and staged package tarballs
        run: pnpm verify

  release-please:
    needs: [actionlint, conventional-commits, verify]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
      paths_released: ${{ steps.release.outputs.paths_released }}
    steps:
      - name: Create release-please app token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.MRCLRCHTR_BOT_CLIENT_ID }}
          private-key: ${{ secrets.MRCLRCHTR_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && needs.release-please.outputs.releases_created == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up workspace dependencies
        uses: ./.github/actions/setup-pnpm

      - name: Publish released packages from staged tarballs
        env:
          PATHS_RELEASED: ${{ needs.release-please.outputs.paths_released }}
        run: node scripts/publish-released.mjs
