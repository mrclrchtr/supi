name: Release Please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-please-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - uses: google-github-actions/release-please-action@e4dc86ba9405554aeba3c6bb2d169500e7d3b4ee # v4.1.1
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up workspace dependencies
        uses: ./.github/actions/setup-pnpm

      - name: Publish released packages
        run: |
          # Publish sub-packages first, then meta-package
          for pkg in packages/supi-aliases packages/supi-ask-user packages/supi-bash-timeout packages/supi-lsp packages/supi-skill-shortcut packages/supi; do
            name=$(jq -r .name "$pkg/package.json")
            version=$(jq -r .version "$pkg/package.json")
            if npm view "$name@$version" version &>/dev/null; then
              echo "$name@$version already published, skipping"
              continue
            fi
            echo "Publishing $name@$version"
            (cd "$pkg" && pnpm publish --no-git-checks --access public --provenance)
          done
