# Shared workflow setup. Keep third-party actions pinned by SHA.
name: Setup pnpm workspace
description: Setup Node.js and pnpm, restore cache, and install dependencies
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      # version omitted — reads from package.json's packageManager field

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 24
        registry-url: "https://registry.npmjs.org"
        cache: pnpm

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
