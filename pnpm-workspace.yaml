packages:
  - "packages/*"
nodeLinker: hoisted

peerDependencyRules:
  allowAny:
    - tree-sitter

allowBuilds:
  # tree-sitter@0.25.0 pins -std=c++17 in binding.gyp, but Node 24's V8
  # headers require C++20, so the native build fails. The package ships no
  # prebuilds, but we never import the native binding — supi-tree-sitter uses
  # web-tree-sitter (WASM) at runtime. Skip the build.
  tree-sitter: false
  tree-sitter-kotlin: false
  '@davisvaughan/tree-sitter-r': false
  '@derekstride/tree-sitter-sql': false
  '@google/genai': true
  koffi: true
  protobufjs: true
  tree-sitter-bash: true
  tree-sitter-c: true
  tree-sitter-cli: true
  tree-sitter-cpp: true
  tree-sitter-go: true
  tree-sitter-html: true
  tree-sitter-java: true
  tree-sitter-javascript: true
  tree-sitter-python: true
  tree-sitter-ruby: true
  tree-sitter-rust: true
  tree-sitter-typescript: true

minimumReleaseAgeExclude:
  - '@earendil-works/pi-agent-core'
  - '@earendil-works/pi-ai'
  - '@earendil-works/pi-coding-agent'
  - '@earendil-works/pi-tui'
